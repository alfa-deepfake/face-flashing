<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Face Flashing MVP</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #222 0, #050505 52%, #000 100%);
        color: #fff;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        gap: 24px;
        padding: 32px;
      }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(8, 8, 12, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        overflow: hidden;
      }

      .camera {
        position: relative;
        min-height: 560px;
        display: grid;
        place-items: center;
        background: #000;
        overflow: hidden;
      }

      .camera-viewport {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 560px;
      }

      .camera-viewport video {
        width: 100%;
        height: 100%;
        min-height: 560px;
        object-fit: cover;
        transform: scaleX(-1);
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      .face-guide {
        position: absolute;
        border: 2px solid rgba(52, 211, 153, 0.9);
        border-radius: 48%;
        box-shadow: 0 0 48px rgba(52, 211, 153, 0.25);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s ease;
      }

      .face-guide.visible {
        opacity: 1;
      }

      .face-guide.missing {
        border-color: rgba(248, 113, 113, 0.95);
        box-shadow: 0 0 32px rgba(248, 113, 113, 0.25);
      }

      .side {
        padding: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        color: #a1a1aa;
        line-height: 1.6;
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 13px 18px;
        background: #8b5cf6;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .secondary {
        background: rgba(255, 255, 255, 0.1);
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 22px;
      }

      progress {
        width: 100%;
        height: 12px;
        margin-top: 18px;
      }

      .result {
        margin-top: 22px;
        border-radius: 18px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      .metric {
        padding: 12px;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.35);
      }

      .metric small {
        display: block;
        color: #71717a;
      }

      .flash {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
        display: none;
        background: #000;
        opacity: 1;
        transition: none;
      }

      .camera-pip {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 30;
        width: 168px;
        height: 126px;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid rgba(255, 255, 255, 0.85);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
        background: #000;
        pointer-events: none;
      }

      .camera-pip video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      .camera-pip[hidden] {
        display: none;
      }

      .error {
        margin-top: 16px;
        color: #fecdd3;
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="flash" class="flash"></div>
    <div id="cameraPip" class="camera-pip" hidden>
      <video id="pipVideo" autoplay muted playsinline></video>
    </div>
    <main class="app">
      <section class="panel camera">
        <div class="camera-viewport">
          <video id="video" autoplay muted playsinline></video>
          <div id="faceGuide" class="face-guide"></div>
        </div>
        <canvas id="canvas" hidden></canvas>
        <canvas id="previewCanvas" hidden></canvas>
      </section>

      <aside class="panel side">
        <h1>Face Flashing MVP</h1>
        <p>
          Дай доступ к камере — овал сам ляжет на лицо (детекция на сервере). Нажми старт,
          смотри в экран: случайные вспышки, сервер проверит отклик и вернёт вероятность.
        </p>

        <div class="actions">
          <button id="start">Начать проверку</button>
          <button id="reset" class="secondary">Сброс</button>
        </div>

        <progress id="progress" value="0" max="100"></progress>
        <p id="status">Готово к запуску</p>
        <p id="error" class="error"></p>

        <div id="result" class="result" hidden></div>
      </aside>
    </main>

    <script>
      const video = document.getElementById("video");
      const pipVideo = document.getElementById("pipVideo");
      const cameraPip = document.getElementById("cameraPip");
      const canvas = document.getElementById("canvas");
      const previewCanvas = document.getElementById("previewCanvas");
      const faceGuide = document.getElementById("faceGuide");
      const cameraViewport = document.querySelector(".camera-viewport");
      const flash = document.getElementById("flash");
      const startButton = document.getElementById("start");
      const resetButton = document.getElementById("reset");
      const statusEl = document.getElementById("status");
      const errorEl = document.getElementById("error");
      const progressEl = document.getElementById("progress");
      const resultEl = document.getElementById("result");

      const PREVIEW_WIDTH = 320;
      const PREVIEW_HEIGHT = 240;
      const PREVIEW_INTERVAL_MS = 180;

      let stream = null;
      let socket = null;
      let previewSocket = null;
      let captureTimer = null;
      let previewTimer = null;
      let raf = 0;
      let sessionFinished = false;
      let faceDetected = false;
      let activeRun = false;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function totalDuration(session) {
        const last = session.challenge.at(-1);
        return last ? last.offset_ms + last.duration_ms + 800 : session.baseline_ms;
      }

      function coverLayout() {
        const vw = video.videoWidth || PREVIEW_WIDTH;
        const vh = video.videoHeight || PREVIEW_HEIGHT;
        const cw = cameraViewport.clientWidth;
        const ch = cameraViewport.clientHeight;
        const scale = Math.max(cw / vw, ch / vh);
        const dw = vw * scale;
        const dh = vh * scale;
        return {
          vw,
          vh,
          scale,
          offsetX: (cw - dw) / 2,
          offsetY: (ch - dh) / 2,
        };
      }

      function updateFaceGuide(message) {
        if (!message.found) {
          faceDetected = false;
          faceGuide.classList.remove("visible");
          faceGuide.classList.add("missing");
          return;
        }

        faceDetected = true;
        const padX = message.w * 0.12;
        const padY = message.h * 0.16;
        const bx = Math.max(0, message.x - padX);
        const by = Math.max(0, message.y - padY);
        const bw = Math.min(message.frame_w - bx, message.w + padX * 2);
        const bh = Math.min(message.frame_h - by, message.h + padY * 2);

        const layout = coverLayout();
        const sx = layout.vw / message.frame_w;
        const sy = layout.vh / message.frame_h;

        const px = bx * sx;
        const py = by * sy;
        const pw = bw * sx;
        const ph = bh * sy;

        const left = layout.offsetX + (layout.vw - px - pw) * layout.scale;
        const top = layout.offsetY + py * layout.scale;
        const width = pw * layout.scale;
        const height = ph * layout.scale;

        faceGuide.style.left = `${left}px`;
        faceGuide.style.top = `${top}px`;
        faceGuide.style.width = `${width}px`;
        faceGuide.style.height = `${height}px`;
        faceGuide.classList.add("visible");
        faceGuide.classList.remove("missing");
      }

      function stopPreviewTracking() {
        if (previewTimer) clearInterval(previewTimer);
        previewTimer = null;
        if (previewSocket) previewSocket.close();
        previewSocket = null;
      }

      function startPreviewTracking() {
        stopPreviewTracking();
        if (!stream || !video.videoWidth) return;

        const previewCtx = previewCanvas.getContext("2d");
        previewCanvas.width = PREVIEW_WIDTH;
        previewCanvas.height = PREVIEW_HEIGHT;

        const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
        previewSocket = new WebSocket(`${wsProtocol}://${location.host}/ws/preview`);

        previewSocket.onmessage = (event) => {
          const message = JSON.parse(event.data);
          if (message.type === "face_bbox") {
            updateFaceGuide(message);
          }
        };

        previewSocket.onopen = () => {
          previewTimer = setInterval(() => {
            if (!previewSocket || previewSocket.readyState !== WebSocket.OPEN) return;
            if (!video.videoWidth) return;
            previewCtx.drawImage(video, 0, 0, PREVIEW_WIDTH, PREVIEW_HEIGHT);
            previewSocket.send(
              JSON.stringify({
                type: "preview_frame",
                image: previewCanvas.toDataURL("image/jpeg", 0.7),
              }),
            );
          }, PREVIEW_INTERVAL_MS);
        };
      }

      window.addEventListener("resize", () => {
        if (faceGuide.classList.contains("visible") && faceDetected) {
          // Re-layout on resize; next bbox message will fix position.
        }
      });

      async function startCamera() {
        if (stream) {
          video.srcObject = stream;
          pipVideo.srcObject = stream;
          cameraPip.hidden = false;
          await video.play().catch(() => undefined);
          await pipVideo.play().catch(() => undefined);
          startPreviewTracking();
          return;
        }

        stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
        });
        video.srcObject = stream;
        pipVideo.srcObject = stream;
        cameraPip.hidden = false;
        await video.play();
        await pipVideo.play();
        startPreviewTracking();
      }

      function stopCamera() {
        stopPreviewTracking();
        if (!stream) return;
        for (const track of stream.getTracks()) {
          track.stop();
        }
        stream = null;
        video.srcObject = null;
        pipVideo.srcObject = null;
        cameraPip.hidden = true;
        faceGuide.classList.remove("visible", "missing");
        faceDetected = false;
      }

      function runFlashes(session, startedAt) {
        cancelAnimationFrame(raf);
        const tick = () => {
          const elapsed = performance.now() - startedAt;
          const step = session.challenge.find(
            (item) => elapsed >= item.offset_ms && elapsed < item.offset_ms + item.duration_ms,
          );

          if (step) {
            flash.style.display = "block";
            flash.style.visibility = "visible";
            flash.style.backgroundColor = step.color;
            flash.style.opacity = "1";
          } else {
            flash.style.display = "none";
            flash.style.visibility = "hidden";
          }

          if (elapsed < totalDuration(session)) {
            raf = requestAnimationFrame(tick);
          } else {
            flash.style.display = "none";
          }
        };
        raf = requestAnimationFrame(tick);
      }

      function startCapture(session, startedAt) {
        const ctx = canvas.getContext("2d");
        const intervalMs = Math.max(33, 1000 / session.frame_rate);
        let frameIndex = 0;
        canvas.width = session.width;
        canvas.height = session.height;

        captureTimer = setInterval(() => {
          const elapsed = performance.now() - startedAt;
          if (elapsed > totalDuration(session)) {
            clearInterval(captureTimer);
            captureTimer = null;
            progressEl.value = 100;
            setStatus("Анализ...");
            socket.send(JSON.stringify({ type: "complete" }));
            return;
          }

          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          socket.send(
            JSON.stringify({
              type: "frame",
              session_id: session.session_id,
              frame_index: frameIndex++,
              elapsed_ms: elapsed,
              client_perf_time: performance.now(),
              image: canvas.toDataURL("image/jpeg", 0.85),
            }),
          );
          progressEl.value = Math.min(100, (elapsed / totalDuration(session)) * 100);
        }, intervalMs);
      }

      function renderResult(result) {
        resultEl.hidden = false;
        resultEl.innerHTML = `
          <h2>${result.verdict.toUpperCase()}</h2>
          <div class="metrics">
            <div class="metric"><small>Live</small>${(result.live_probability * 100).toFixed(1)}%</div>
            <div class="metric"><small>Spoof</small>${(result.spoof_probability * 100).toFixed(1)}%</div>
            <div class="metric"><small>Latency</small>${result.metrics.mean_latency_ms ?? "n/a"} ms</div>
            <div class="metric"><small>Color match</small>${Number(result.metrics.color_match_score ?? 0).toFixed(3)}</div>
            <div class="metric"><small>Passed flashes</small>${result.metrics.passed_flashes ?? 0}/${result.metrics.measurable_flashes ?? 0}</div>
            <div class="metric"><small>Challenge</small>${result.metrics.challenge_passed ? "passed" : "failed"}</div>
          </div>
          <p>${result.reasons.join(", ")}</p>
          <details style="margin-top:12px">
            <summary>Debug metrics</summary>
            <pre style="white-space:pre-wrap;font-size:12px;color:#a1a1aa">${JSON.stringify(result.metrics, null, 2)}</pre>
          </details>
        `;
      }

      function cleanup() {
        activeRun = false;
        if (captureTimer) clearInterval(captureTimer);
        cancelAnimationFrame(raf);
        if (socket) socket.close();
        captureTimer = null;
        socket = null;
        flash.style.display = "none";
        cameraPip.hidden = !stream;
        startButton.disabled = false;
        document.exitFullscreen?.().catch(() => undefined);
        if (stream && !document.hidden) startPreviewTracking();
      }

      function abortHiddenRun() {
        if (!activeRun) return;
        errorEl.textContent =
          "Проверка отменена: вкладка была скрыта или окно браузера свернуто. Оставьте страницу открытой во время вспышек.";
        setStatus("Проверка отменена");
        cleanup();
      }

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          abortHiddenRun();
          stopPreviewTracking();
        } else if (stream && !activeRun) {
          startPreviewTracking();
        }
      });

      startButton.addEventListener("click", async () => {
        cleanup();
        errorEl.textContent = "";
        resultEl.hidden = true;
        sessionFinished = false;
        startButton.disabled = true;

        try {
          setStatus("Запуск камеры...");
          await startCamera();
          cameraPip.hidden = false;
          await document.documentElement.requestFullscreen?.().catch(() => undefined);

          setStatus("Создание challenge...");
          stopPreviewTracking();
          activeRun = true;
          const session = await fetch("/api/session", { method: "POST" }).then((res) => res.json());
          const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
          socket = new WebSocket(`${wsProtocol}://${location.host}/ws/${session.session_id}`);

          socket.onmessage = (event) => {
            const message = JSON.parse(event.data);
            if (message.type === "result") {
              sessionFinished = true;
              setStatus("Готово");
              renderResult(message.payload);
              cleanup();
            }
            if (message.type === "error") {
              errorEl.textContent = message.message || "Ошибка liveness сервиса";
              setStatus("Ошибка");
              cleanup();
            }
          };

          socket.onerror = () => {
            errorEl.textContent = "WebSocket error";
            setStatus("Ошибка");
            cleanup();
          };

          socket.onclose = () => {
            if (!sessionFinished && !errorEl.textContent) {
              errorEl.textContent = "Соединение закрыто до получения результата";
              setStatus("Ошибка");
              cleanup();
            }
          };

          socket.onopen = () => {
            const startedAt = performance.now();
            setStatus("Идет проверка...");
            cameraPip.hidden = false;
            runFlashes(session, startedAt);
            startCapture(session, startedAt);
          };
        } catch (error) {
          cleanup();
          errorEl.textContent = error instanceof Error ? error.message : String(error);
          setStatus("Ошибка");
        }
      });

      resetButton.addEventListener("click", () => {
        cleanup();
        stopCamera();
        progressEl.value = 0;
        resultEl.hidden = true;
        errorEl.textContent = "";
        setStatus("Готово к запуску");
      });

      startCamera()
        .then(() => setStatus("Камера готова. Наведите лицо — овал подстроится сам"))
        .catch((error) => {
          errorEl.textContent =
            error instanceof Error
              ? error.message
              : "Не удалось получить доступ к камере. Разрешите камеру в браузере.";
          setStatus("Нужен доступ к камере");
        });
    </script>
  </body>
</html>
